syntax = "proto3";

package com.opensource.svga;

option objc_class_prefix = "SVGAProto";
option java_package = "com.opensource.svgaplayer.proto";

message MovieParams {
  float viewBoxWidth = 1;
  float viewBoxHeight = 2;
  int32 fps = 3;
  int32 frames = 4;
}

message SpriteEntity {
  string imageKey = 1;
  repeated FrameEntity frames = 2;
  string matteKey = 3;
}

// message AudioEntity {
//   string audioKey = 1;
//   int32 startFrame = 2;
//   int32 endFrame = 3;
//   int32 startTime = 4;
//   int32 totalTime = 5;
// }

message Layout {
  float x = 1;
  float y = 2;
  float width = 3;
  float height = 4;
}

message Transform {
  float a = 1;
  float b = 2;
  float c = 3;
  float d = 4;
  float tx = 5;
  float ty = 6;
}

message ShapeEntity {
  // oneof args {
  //   ShapeArgs shape = 2;
  //   RectArgs rect = 3;
  //   EllipseArgs ellipse = 4;
  // }

  ShapeType type = 1;
  ShapeArgs shape = 2;
  RectArgs rect = 3;
  EllipseArgs ellipse = 4;
  ShapeStyle styles = 10;
  Transform transform = 11;

  enum ShapeType {
    SHAPE = 0;
    RECT = 1;
    ELLIPSE = 2;
    KEEP = 3;
  }

  message ShapeArgs {
    string d = 1;
  }

  message RectArgs {
    float x = 1;
    float y = 2;
    float width = 3;
    float height = 4;
    float cornerRadius = 5;
  }

  message EllipseArgs {
    float x = 1;
    float y = 2;
    float radiusX = 3;
    float radiusY = 4;
  }

  message ShapeStyle {
    RGBAColor fill = 1;
    RGBAColor stroke = 2;
    float strokeWidth = 3;
    LineCap lineCap = 4;
    LineJoin lineJoin = 5;
    float miterLimit = 6;
    float lineDashI = 7;
    float lineDashII = 8;
    float lineDashIII = 9;

    message RGBAColor {
      float r = 1;
      float g = 2;
      float b = 3;
      float a = 4;
    }

    enum LineCap {
      LineCapButt = 0;
      LineCapRound = 1;
      LineCapSquare = 2;
    }

    enum LineJoin {
      LineJoinMiter = 0;
      LineJoinRound = 1;
      LineJoinBevel = 2;
    }
  }
}

message FrameEntity {
  float alpha = 1;
  Layout layout = 2;
  Transform transform = 3;
  string clipPath = 4;
  repeated ShapeEntity shapes = 5;
}

message MovieEntity {
  string version = 1;
  MovieParams params = 2;
  map<string, bytes> images = 3;
  repeated SpriteEntity sprites = 4;
  // repeated AudioEntity audios = 5;
}
